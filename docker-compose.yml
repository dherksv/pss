version: '3.9'

services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_data
      - sqlite_data:/app/db
    env_file: .env
    depends_on:
      - redis
    command: uvicorn main:app --reload --host 0.0.0.0 --port 8000

  worker:
    build: ./backend
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_data
      - sqlite_data:/app/db
    env_file: .env
    depends_on:
      - redis
    command: python worker.py

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src          
      - ./frontend/public:/app/public
    depends_on:
      - api

volumes:
  chroma_data:
  sqlite_data:
